name: Mart Build

# Nightly cron schedule removed by request — builds now only run on demand:
# the "Build Mart" button in Data Hub, or auto-triggered right after a
# successful upload (see multipart/complete/route.ts). Both go through
# workflow_dispatch below.
on:
  workflow_dispatch:
    inputs:
      attribution_days:
        description: 'Attribution window in days (default: 30)'
        required: false
        default: '30'

# Queue instead of running concurrently, since the manual button and the
# upload auto-trigger can both fire close together — this stops two builds
# from DROP/CREATE-ing the same mart table at once.
concurrency:
  group: mart-build
  cancel-in-progress: false

jobs:
  build-mart:
    name: Rebuild mart tables
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run mart build
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          ATTRIBUTION_DAYS:  ${{ inputs.attribution_days || '30' }}
          NODE_ENV:          production
        run: npx tsx scripts/build-mart.ts
